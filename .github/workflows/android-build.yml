name: 🤖 Android Build - Eclipse Frontier

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"
  GODOT_RELEASE: "stable"
  ANDROID_SDK_VERSION: "34"
  PROJECT_NAME: "eclipse-frontier"
  EXPORT_NAME: "Eclipse Frontier"

jobs:
  build-android:
    name: 🏗️ Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          submodules: false

      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
          build-tools-version: "34.0.0"
          ndk-version: "23.2.8568313"

      - name: 🔧 Install Android NDK
        run: |
          echo "Installing Android NDK..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;23.2.8568313"
          echo "NDK installed successfully"

      - name: 📦 Cache Godot
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-linux

      - name: ⬇️ Download Godot Engine
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Godot ${{ env.GODOT_VERSION }}..."
          
          GODOT_FILENAME="Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_linux.x86_64"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}/${GODOT_FILENAME}.zip"
          
          wget -q "$GODOT_URL" -O godot.zip
          unzip -q godot.zip
          mv "$GODOT_FILENAME" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          
          echo "Godot downloaded and installed successfully"
          godot --version

      - name: ⬇️ Download Godot Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Godot export templates..."
          
          TEMPLATES_FILENAME="Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_export_templates.tpz"
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}/${TEMPLATES_FILENAME}"
          
          wget -q "$TEMPLATES_URL" -O templates.tpz
          
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_RELEASE }}
          unzip -q templates.tpz -d /tmp/templates
          
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_RELEASE }}/
          
          echo "Export templates installed successfully"
          ls ~/.local/share/godot/export_templates/

      - name: 🔑 Setup Debug Keystore
        run: |
          echo "Setting up debug keystore..."
          
          mkdir -p android
          
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          
          echo "Debug keystore created successfully"

      - name: 📂 Create Build Directory
        run: |
          mkdir -p build
          echo "Build directory created"

      - name: 🔄 Import Project
        run: |
          echo "Importing Godot project..."
          
          timeout 120 godot \
            --headless \
            --path . \
            --import \
            --quit || true
          
          echo "Project import completed"

      - name: 📱 Export Android APK (Debug)
        run: |
          echo "Building Android Debug APK..."
          
          godot \
            --headless \
            --path . \
            --export-debug "Android" \
            "build/${{ env.PROJECT_NAME }}-debug.apk" \
            --quit
          
          echo "Debug APK build completed"

      - name: 📱 Export Android APK (Release)
        run: |
          echo "Building Android Release APK..."
          
          godot \
            --headless \
            --path . \
            --export-release "Android" \
            "build/${{ env.PROJECT_NAME }}-release.apk" \
            --quit
          
          echo "Release APK build completed"

      - name: ✅ Verify APK Files
        run: |
          echo "=== Verifying APK files ==="
          
          if [ -f "build/${{ env.PROJECT_NAME }}-debug.apk" ]; then
            DEBUG_SIZE=$(du -sh "build/${{ env.PROJECT_NAME }}-debug.apk" | cut -f1)
            echo "✅ Debug APK: $DEBUG_SIZE"
          else
            echo "❌ Debug APK not found!"
            exit 1
          fi
          
          if [ -f "build/${{ env.PROJECT_NAME }}-release.apk" ]; then
            RELEASE_SIZE=$(du -sh "build/${{ env.PROJECT_NAME }}-release.apk" | cut -f1)
            echo "✅ Release APK: $RELEASE_SIZE"
          else
            echo "⚠️ Release APK not found (may be expected for unsigned builds)"
          fi
          
          echo ""
          echo "=== Build Directory Contents ==="
          ls -lh build/

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-frontier-debug-apk
          path: build/${{ env.PROJECT_NAME }}-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eclipse-frontier-release-apk
          path: build/${{ env.PROJECT_NAME }}-release.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📋 Show Build Logs
        if: always()
        run: |
          echo "=== Build Information ==="
          echo "Godot Version: ${{ env.GODOT_VERSION }}"
          echo "Android SDK: ${{ env.ANDROID_SDK_VERSION }}"
          echo "Build Time: $(date)"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "=== Environment ==="
          java -version
          echo "Android SDK: $ANDROID_HOME"

      - name: 🎉 Build Summary
        if: success()
        run: |
          echo "================================="
          echo "✅ BUILD SUCCESSFUL!"
          echo "================================="
          echo "Project: ${{ env.EXPORT_NAME }}"
          echo "Version: 0.1.0"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "APK files are available in Artifacts section"
          echo "================================="

      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "================================="
          echo "❌ BUILD FAILED!"
          echo "================================="
          echo "Please check the logs above for errors"
          echo "================================="
