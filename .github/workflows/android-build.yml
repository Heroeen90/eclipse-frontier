name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "EclipseFrontier"
  EXPORT_PRESET: "Android"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Checkout Repository
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 2. Install Java (required by Android SDK / Gradle)
      # ------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ------------------------------------------------------------
      # 3. Cache Godot binary & export templates (speeds up future runs)
      # ------------------------------------------------------------
      - name: Cache Godot installation
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ runner.os }}

      # ------------------------------------------------------------
      # 4. Install Godot Engine (headless)
      # ------------------------------------------------------------
      - name: Download and install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          wget -q "https://downloads.tuxfamily.org/godotengine/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip -d godot_bin
          chmod +x "godot_bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64"
          sudo mv "godot_bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          godot --version

      # ------------------------------------------------------------
      # 5. Install Godot Export Templates
      # ------------------------------------------------------------
      - name: Download and install export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/.local/share/godot/export_templates
          wget -q "https://downloads.tuxfamily.org/godotengine/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d templates_extracted
          mv templates_extracted/templates "$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          ls "$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"

      # ------------------------------------------------------------
      # 6. Install Android Build Dependencies (SDK / NDK)
      # ------------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          set -e
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest" \
            "ndk;23.2.8568313" > /dev/null
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"

      # ------------------------------------------------------------
      # 7. Generate Debug Keystore (used by export_presets.cfg)
      # ------------------------------------------------------------
      - name: Generate Android debug keystore
        run: |
          set -e
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Eclipse Frontier Debug,O=EclipseFrontier,C=US"
          fi

      # ------------------------------------------------------------
      # 8. Configure Godot Editor Settings (Android SDK path)
      # ------------------------------------------------------------
      - name: Configure Godot editor settings for Android
        run: |
          set -e
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${HOME}/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          EOF

      # ------------------------------------------------------------
      # 9. Import Project (generates .godot cache)
      # ------------------------------------------------------------
      - name: Import Godot project
        run: |
          set -e
          godot --headless --editor --quit --import || true
          godot --headless --editor --quit --import

      # ------------------------------------------------------------
      # 10. Build Android APK
      # ------------------------------------------------------------
      - name: Create build output directory
        run: mkdir -p build/android

      - name: Export Android APK (Debug)
        run: |
          set -e
          godot --headless --export-debug "${{ env.EXPORT_PRESET }}" "build/android/${{ env.EXPORT_NAME }}.apk"

      # ------------------------------------------------------------
      # 11. Verify Build Output
      # ------------------------------------------------------------
      - name: Verify APK was created
        run: |
          set -e
          if [ -f "build/android/${{ env.EXPORT_NAME }}.apk" ]; then
            echo "✅ APK build succeeded."
            ls -lh "build/android/${{ env.EXPORT_NAME }}.apk"
          else
            echo "❌ APK build failed: file not found."
            exit 1
          fi

      # ------------------------------------------------------------
      # 12. Upload APK as Build Artifact
      # ------------------------------------------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          retention-days: 30
          if-no-files-found: error

      # ------------------------------------------------------------
      # 13. Show Build Summary / Logs
      # ------------------------------------------------------------
      - name: Build summary
        if: always()
        run: |
          echo "==================================================="
          echo "Eclipse Frontier - Android Build Summary"
          echo "==================================================="
          echo "Godot version : ${{ env.GODOT_VERSION }}"
          echo "Export preset : ${{ env.EXPORT_PRESET }}"
          echo "Output file   : build/android/${{ env.EXPORT_NAME }}.apk"
          echo "Status        : ${{ job.status }}"
          echo "==================================================="
