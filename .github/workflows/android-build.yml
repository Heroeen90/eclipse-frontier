name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip
          echo "Dependencies installed"

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v4.2.2-stable_linux.x86_64" godot
          chmod +x godot
          echo "Godot ready"

      - name: Download Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/
          echo "Templates ready"
          ls ~/.local/share/godot/export_templates/4.2.2.stable/ | grep -i android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;23.2.8568313" 2>/dev/null
          echo "NDK installed"

      - name: Create Keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,O=Debug,C=US" 2>/dev/null
          echo "Keystore created"

      - name: Setup Editor Settings
        run: |
          mkdir -p ~/.config/godot
          JAVA_PATH=$(readlink -f $(which java) | sed 's|/bin/java||')
          echo "Java path: $JAVA_PATH"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/java_sdk_path = "%s"\n' "$ANDROID_HOME" "$JAVA_PATH" > ~/.config/godot/editor_settings-4.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Update Export Presets Keystore
        run: |
          KEYSTORE_PATH="$(pwd)/debug.keystore"
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"$KEYSTORE_PATH\"|g" export_presets.cfg
          echo "Export presets updated with keystore"
          grep keystore export_presets.cfg

      - name: Import Project
        run: |
          timeout 90 ./godot --headless --path "$(pwd)" --import --quit-after 30 2>&1 | tail -10 || true
          echo "Import done"
          sleep 2

      - name: Create Build Dir
        run: mkdir -p build

      - name: Build APK
        run: |
          ./godot \
            --headless \
            --path "$(pwd)" \
            --export-debug "Android" \
            "$(pwd)/build/eclipse-frontier.apk" 2>&1
          echo "Build finished with code: $?"

      - name: Verify Build
        run: |
          if [ -f "build/eclipse-frontier.apk" ]; then
            echo "SUCCESS"
            ls -lah build/eclipse-frontier.apk
          else
            echo "FAILED - APK not found"
            ls -la build/ || echo "build/ is empty"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: eclipse-frontier-apk
          path: build/eclipse-frontier.apk
          retention-days: 30

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-logs
          path: ~/.config/godot/
          retention-days: 7
